<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your shopping cart — Scent Luxe." />
  <title>Cart | Scent Luxe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/cart.css" />
</head>
<body>

  <div id="navbar"></div>

  <main>
    <div class="container cart-page-wrap">

      <h1 class="cart-page-title">
        Your Cart
        <span class="cart-count-label">(<span id="cart-count">0</span> item<span id="cart-count-plural">s</span>)</span>
      </h1>

      <!-- ── Empty State ──────────────────────────── -->
      <div id="cart-empty" style="display:none; flex-direction:column; align-items:center;">
        <div class="empty-icon">🛍</div>
        <h2>Your cart is empty</h2>
        <p>Discover our collection of luxury fragrances</p>
        <a href="shop.html" class="btn-primary">Continue Shopping</a>
      </div>

      <!-- ── Cart Content ─────────────────────────── -->
      <div id="cart-items-wrapper">
        <div class="cart-container">

          <!-- Items Section -->
          <section class="cart-items-section" aria-label="Cart items">
            <div id="cart-items-list">
              <!-- Injected by cart-page.js -->
            </div>
          </section>

          <!-- Order Summary -->
          <aside class="cart-summary" aria-label="Order summary">
            <div class="cart-summary-title">Order Summary</div>

            <div class="summary-row">
              <span>Subtotal</span>
              <span id="summary-subtotal">$0.00</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span style="color:var(--color-success);font-weight:600">Free</span>
            </div>

            <div class="summary-row-total">
              <span>Total</span>
              <span id="summary-total">$0.00</span>
            </div>

            <button class="btn-checkout" id="btn-checkout">
              Proceed to Checkout
            </button>

            <a href="shop.html" class="btn-continue">← Continue Shopping</a>
          </aside>

        </div>
      </div>

    </div>
  </main>

  <div id="footer"></div>

  <script src="js/data/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
